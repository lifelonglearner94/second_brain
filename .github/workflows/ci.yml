name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend (fmt · clippy · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --all

  frontend:
    name: frontend (lint · check · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck (svelte-check)
        run: npm run check
      - name: unit + component tests (vitest)
        run: npm test
      - name: build (adapter-static PWA Bundle)
        run: npm run build
      - name: install playwright browser
        run: npx playwright install --with-deps chromium
      - name: e2e smoke (playwright)
        run: npm run test:e2e

  compose:
    name: compose (topology validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # infrastructure/.env is gitignored (runtime secrets, ADR-0004) and is
      # never present in CI. Stub an empty file so `docker compose config`
      # resolves the env_file path without leaking or needing secrets.
      - name: validate topology (docker compose config + structural tests)
        run: |
          touch infrastructure/.env
          docker compose config >/dev/null
          bash infrastructure/test/topology.sh

  zero-trust:
    name: zero-trust (no secret baked into any Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ADR-0004 / ADR-0009 / issue #40: assert no Dockerfile ENV/ARG/COPY bakes
      # a secret literal, so images stay public-safe artifacts. The guard reads
      # .env.example's [SECRET] legend as the authoritative key-name list
      # (word-segment heuristic as fallback for unknown keys). --self-test plants
      # a secret fixture (RED, must fail — incl. URL-form NTFY_WEBHOOK_URL
      # [SECRET]) then scans the real repo Dockerfiles (GREEN, must pass).
      # GHA-blind: never reads/writes/references infrastructure/.env — only
      # Dockerfiles and .env.example (which carries no values).
      - name: self-test (planted secret fails · .env.example legend · real Dockerfiles pass)
        run: bash infrastructure/test/zero-trust.sh --self-test
