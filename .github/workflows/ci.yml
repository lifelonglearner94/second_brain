name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend (fmt · clippy · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --all

  frontend:
    name: frontend (lint · check · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck (svelte-check)
        run: npm run check
      - name: unit + component tests (vitest)
        run: npm test
      - name: build (adapter-static PWA Bundle)
        run: npm run build
      - name: install playwright browser
        run: npx playwright install --with-deps chromium
      - name: e2e smoke (playwright)
        run: npm run test:e2e

  compose:
    name: compose (topology validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # infrastructure/.env is gitignored (runtime secrets, ADR-0004) and is
      # never present in CI. Stub an empty file so `docker compose config`
      # resolves the env_file path without leaking or needing secrets.
      - name: validate topology (docker compose config + structural tests)
        run: |
          touch infrastructure/.env
          docker compose config >/dev/null
          bash infrastructure/test/topology.sh
          bash infrastructure/test/replica.sh
          bash infrastructure/health-push.sh --self-test

  zero-trust:
    name: zero-trust (no secret baked into any Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ADR-0004 / ADR-0009 / issue #40: assert no Dockerfile ENV/ARG/COPY bakes
      # a secret literal, so images stay public-safe artifacts. The guard reads
      # .env.example's [SECRET] legend as the authoritative key-name list
      # (word-segment heuristic as fallback for unknown keys). --self-test plants
      # a secret fixture (RED, must fail — incl. URL-form NTFY_WEBHOOK_URL
      # [SECRET]) then scans the real repo Dockerfiles (GREEN, must pass).
      # GHA-blind: never reads/writes/references infrastructure/.env — only
      # Dockerfiles and .env.example (which carries no values).
      - name: self-test (planted secret fails · .env.example legend · real Dockerfiles pass)
        run: bash infrastructure/test/zero-trust.sh --self-test

  # --- deploy (ADR-0003 / ADR-0007) ------------------------------------------
  # Runs only on push to main, after all CI jobs pass. Builds the two Zero-Trust
  # images on the GHA runner (a Rust release build spikes >2GB RAM and would
  # OOM the running brain if built on the VPS — ADR-0003), pushes them to GHCR
  # tagged by commit SHA, then SSHes into the VPS with the command-restricted
  # deploy key. The VPS only ever executes `docker compose pull && up -d`.
  # GHA writes only non-secret Deploy State (deploy.env: SHA tags + REGISTRY);
  # runtime secrets (.env) are placed manually and never touched by CI (ADR-0004).
  deploy:
    name: deploy (build → GHCR → VPS pull)
    needs: [backend, frontend, compose, zero-trust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve SHA image tag
        id: tag
        run: echo "sha=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ghcr.io/lifelonglearner94/second-brain-backend:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=backend
      - name: Build + push edge image (PWA Bundle baked in)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/edge/Dockerfile
          push: true
          tags: ghcr.io/lifelonglearner94/second-brain-edge:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=edge
      - name: Configure SSH for the deploy key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 89.58.14.42 >> ~/.ssh/known_hosts 2>/dev/null
      - name: Write deploy.env to VPS and pull + up (command-restricted SSH)
        run: |
          printf 'REGISTRY=ghcr.io/lifelonglearner94/\nEDGE_TAG=%s\nBACKEND_TAG=%s\n' \
            "${{ steps.tag.outputs.sha }}" "${{ steps.tag.outputs.sha }}" \
            | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes deploy@89.58.14.42
