# Two-service Compose topology (ADR-0001) + one infra sidecar:
#   Edge    — custom Caddy image: terminates TLS, serves the baked PWA Bundle
#             via file_server, reverse-proxies /api/* to the Backend.
#   Backend — Rust/Axum; internal-only (ADR-0006): expose, no host ports.
#   Litestream — Brain Replica sidecar (ADR-0002): tails the Brain File WAL on
#             sqlite_data and streams to Cloudflare R2. Infra, not user-facing.
#
# The Brain File lives on the named volume `sqlite_data` mounted at /data
# (never a bind mount, never baked into an image). Runtime secrets come from
# infrastructure/.env via env_file (ADR-0004). Image tags fall back to `latest`
# when deploy.env is absent — the Deploy State file (#31 / ADR-0007) is not
# required for local dev.
#
#   Local dev:  docker compose up
#   Tear down:  docker compose down          # keeps the Brain File
#               docker compose down -v       # destroys the Brain File

services:
  edge:
    # ${REGISTRY:-} is empty for local dev (image: second-brain-edge) and set
    # to ghcr.io/<owner>/ in deploy.env on the VPS (ADR-0003 / ADR-0007). The
    # EDGE_TAG fallback keeps local dev on `latest` when deploy.env is absent.
    image: ${REGISTRY:-}second-brain-edge:${EDGE_TAG:-latest}
    build:
      context: .
      dockerfile: infrastructure/edge/Dockerfile
    ports:
      - "80:80"
      # 443 for HTTPS (Caddy auto-HTTPS in production via Caddyfile.prod; unused
      # in local dev where Caddyfile binds :80 only). The firewall in
      # bootstrap.sh already allows 443.
      - "443:443"
    networks:
      - app_network
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    # See edge: ${REGISTRY:-} switches between local dev and GHCR on the VPS.
    image: ${REGISTRY:-}second-brain-backend:${BACKEND_TAG:-latest}
    build:
      context: backend
      dockerfile: Dockerfile
    # ADR-0006: the Backend is internal-only. `expose:` documents the
    # container port WITHOUT publishing it to the host; there is deliberately
    # NO `ports:` block. Caddy (the Edge) is the sole published port. Do not
    # "fix" the missing ports — see ADR-0006.
    expose:
      - "8080"
    volumes:
      # Brain File on a named volume (ADR-0007): never a bind mount.
      - sqlite_data:/data
    env_file:
      # Placed manually on the host, never touched by CI (ADR-0004). Path is
      # resolved relative to this compose file (repo root).
      - infrastructure/.env
    networks:
      - app_network
    restart: unless-stopped

  litestream:
    # Brain Replica sidecar (ADR-0002, slice #32). Tails the Brain File WAL on
    # the shared sqlite_data volume (read-only) and streams to Cloudflare R2,
    # cutting the Recovery Point Objective to ~1 second. NOT a user-facing
    # service — an infra sidecar alongside edge/backend. The backend already
    # runs in WAL mode with busy_timeout=5000 (backend/src/db.rs), so Litestream's
    # PASSIVE checkpoints do not contend with writes.
    image: litestream/litestream:0.5.13
    command: ["replicate"]
    volumes:
      # Read-only WAL tailing: Litestream only reads the Brain File + -wal/-shm.
      - sqlite_data:/data:ro
      - ./infrastructure/litestream.yml:/etc/litestream.yml:ro
    env_file:
      # R2 credentials are auto-read by Litestream from LITESTREAM_ACCESS_KEY_ID
      # / LITESTREAM_SECRET_ACCESS_KEY in infrastructure/.env (ADR-0004). The
      # committed litestream.yml references no secret — Zero-Trust (ADR-0004).
      - infrastructure/.env
    ports:
      # Prometheus metrics for the Health Push (#33) — loopback-only so the
      # host cron can curl /metrics without exposing it externally. The nftables
      # firewall (bootstrap.sh) drops :9090 from outside as defense-in-depth.
      - "127.0.0.1:9090:9090"
    networks:
      - app_network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  sqlite_data:
