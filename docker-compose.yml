# Two-service Compose topology (ADR-0001):
#   Edge    — custom Caddy image: terminates TLS, serves the baked PWA Bundle
#             via file_server, reverse-proxies /api/* to the Backend.
#   Backend — Rust/Axum; internal-only (ADR-0006): expose, no host ports.
#
# The Brain File lives on the named volume `sqlite_data` mounted at /data
# (never a bind mount, never baked into an image). Runtime secrets come from
# infrastructure/.env via env_file (ADR-0004). Image tags fall back to `latest`
# when deploy.env is absent — the Deploy State file (#31 / ADR-0007) is not
# required for local dev.
#
#   Local dev:  docker compose up
#   Tear down:  docker compose down          # keeps the Brain File
#               docker compose down -v       # destroys the Brain File

services:
  edge:
    # ${REGISTRY:-} is empty for local dev (image: second-brain-edge) and set
    # to ghcr.io/<owner>/ in deploy.env on the VPS (ADR-0003 / ADR-0007). The
    # EDGE_TAG fallback keeps local dev on `latest` when deploy.env is absent.
    image: ${REGISTRY:-}second-brain-edge:${EDGE_TAG:-latest}
    build:
      context: .
      dockerfile: infrastructure/edge/Dockerfile
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    # See edge: ${REGISTRY:-} switches between local dev and GHCR on the VPS.
    image: ${REGISTRY:-}second-brain-backend:${BACKEND_TAG:-latest}
    build:
      context: backend
      dockerfile: Dockerfile
    # ADR-0006: the Backend is internal-only. `expose:` documents the
    # container port WITHOUT publishing it to the host; there is deliberately
    # NO `ports:` block. Caddy (the Edge) is the sole published port. Do not
    # "fix" the missing ports — see ADR-0006.
    expose:
      - "8080"
    volumes:
      # Brain File on a named volume (ADR-0007): never a bind mount.
      - sqlite_data:/data
    env_file:
      # Placed manually on the host, never touched by CI (ADR-0004). Path is
      # resolved relative to this compose file (repo root).
      - infrastructure/.env
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  sqlite_data:
